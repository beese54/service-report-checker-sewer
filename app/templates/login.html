<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — WRN Service Report Checker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <style>
    body { background: #f4f6fa; }
    .hero { background: #0d2b55; color: #fff; padding: 2rem 0 1.5rem; margin-bottom: 2.5rem; }
    .hero h1 { font-size: 1.5rem; font-weight: 700; }
    .login-card {
      max-width: 400px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.1);
      padding: 2.5rem 2rem;
    }
    .login-card h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 1.5rem; }
    .lock-icon { font-size: 2.5rem; margin-bottom: 1rem; text-align: center; }
  </style>
</head>
<body>

<div class="hero">
  <div class="container">
    <h1>WRN Service Report Checker</h1>
  </div>
</div>

<div class="container">
  <div class="login-card">
    <div class="lock-icon">&#128274;</div>
    <h2 class="text-center">Sign In</h2>

    {% if error %}
    <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label for="password" class="form-label fw-semibold">Password</label>
        <input type="password" id="password" name="password"
               class="form-control" placeholder="Enter password" autofocus required />
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign In</button>
    </form>
  </div>
</div>

</body>
</html>
